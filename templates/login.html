{% extends "base.html" %}
{% block title %}Login — Greenleaf{% endblock %}
{% block content %}
<section class="auth-shell">
  <div class="auth-card">
    <h1>Welcome back 🌿</h1>
    <p class="muted">Log in to continue shopping for your green companions.</p>
    <form method="post" action="{{ url_for('login') }}" class="auth-form">
      <label>Username or Email<input type="text" name="identifier" required autofocus /></label>
      <label>Password<input type="password" name="password" required /></label>
      <button type="submit" class="btn btn-primary btn-full">Login</button>
    </form>
    <p class="auth-switch">New here? <a href="{{ url_for('signup') }}">Create an account</a></p>
  </div>
  <div class="auth-side" style="background-image:url('https://images.unsplash.com/photo-1466692476868-aef1dfb1e735?w=900&q=80')"></div>
</section>
{% endblock %}
