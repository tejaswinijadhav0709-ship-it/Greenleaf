{% extends "base.html" %}
{% block title %}Sign Up — Greenleaf{% endblock %}
{% block content %}
<section class="auth-shell">
  <div class="auth-card">
    <h1>Join Greenleaf 🌱</h1>
    <p class="muted">Create an account to track orders and save your favourite plants.</p>
    <form method="post" action="{{ url_for('signup') }}" class="auth-form">
      <label>Username<input type="text" name="username" required autofocus minlength="3" /></label>
      <label>Email<input type="email" name="email" required /></label>
      <label>Password<input type="password" name="password" required minlength="6" /><small class="muted">Minimum 6 characters.</small></label>
      <button type="submit" class="btn btn-primary btn-full">Create Account</button>
    </form>
    <p class="auth-switch">Already have an account? <a href="{{ url_for('login') }}">Login here</a></p>
  </div>
  <div class="auth-side" style="background-image:url('https://images.unsplash.com/photo-1459411552884-841db9b3cc2a?w=900&q=80')"></div>
</section>
{% endblock %}
